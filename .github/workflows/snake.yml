name: generate snake
on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: [ main ]
  workflow_dispatch: {}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: DevEpisolon
          outputs: |
            dist/snake.gif?color_snake=%23ff4fd8&color_dots=%2312121f,%2389cff0,%237ec8e3,%236ec6ea,%235bc0eb&color_background=%2305050f
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
