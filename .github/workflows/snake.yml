name: generate snake
on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: [ main ]
  workflow_dispatch: {}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: DevEpisolon
          outputs: |
            dist/snake.gif?color_snake=%23ff4fd8&color_dots=0,#0a0a2a,#1a1a4a,#2d2d7a,#4b4bb5,#ff4fd8
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
